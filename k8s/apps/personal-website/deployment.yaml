# Personal Website (msdqn.dev) Kubernetes Deployment
# This is a template - adjust image and ports based on the actual NixOS module
apiVersion: apps/v1
kind: Deployment
metadata:
  name: personal-website
  namespace: apps
  labels:
    app: personal-website
spec:
  replicas: 1
  selector:
    matchLabels:
      app: personal-website
  template:
    metadata:
      labels:
        app: personal-website
    spec:
      containers:
      - name: personal-website
        # TODO: Replace with actual container image from flake
        # Option 1: Build OCI image from Nix and push to registry
        # Option 2: Use nixery.dev to generate image on-the-fly
        image: ghcr.io/maulanasdqn/personal-website:latest
        ports:
        - containerPort: 4321
          name: http
        envFrom:
        - secretRef:
            name: personal-website-env
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 200m
            memory: 256Mi
        livenessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
